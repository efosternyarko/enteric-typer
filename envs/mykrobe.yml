name: mykrobe
channels:
  - bioconda
  - conda-forge
dependencies:
  - python=3.8         # mykrobe 0.13.0 py38 build; py310 build does not exist on bioconda
  - mykrobe=0.13.0
  - setuptools<70
  - c-ares<1.34        # cap c-ares to avoid libnghttp2/libcurl conflict chain via mongodb
  - libnghttp2<1.60
